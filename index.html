<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>IronWake Docs — Power-Up</title>
  <script src="https://p.trellocdn.com/power-up.min.js"></script>
</head>
<body>
<script>
  const ICON_SVG = 'data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="%234f98a3" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>';

  TrelloPowerUp.initialize({

    'card-buttons': function(t, options) {
      return [{
        icon: ICON_SVG,
        text: 'Living Doc',
        callback: function(t) {
          return t.popup({
            title: 'IronWake Living Doc',
            url: './card-back.html',
            height: 560
          });
        }
      }];
    },

    'card-back-section': function(t, options) {
      return t.get('card', 'shared', 'ironwake-doc-content', '').then(function(content) {
        const preview = content
          ? content.replace(/#{1,6}\s/g, '').substring(0, 120) + (content.length > 120 ? '…' : '')
          : 'No notes yet. Click to add.';

        return {
          title: '📄 Living Doc',
          icon: ICON_SVG,
          content: {
            type: 'iframe',
            url: t.signUrl('./card-back.html'),
            height: 500
          }
        };
      });
    }

  }, {
    appKey:    'b208ebfcd48577afc6100ad1be81a4a3',
    appName:   'IronWake Docs'
  });
</script>
</body>
</html>
